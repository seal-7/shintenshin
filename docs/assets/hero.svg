<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Shintenshin — two silhouettes joined by a chakra transfer arc">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#161230"/>
      <stop offset="60%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#050509"/>
    </radialGradient>
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c4b5fd" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="3"/></filter>
    <linearGradient id="silhouette" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1a30"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- faint kanji watermark -->
  <text x="600" y="230" text-anchor="middle" font-family="serif" font-size="220"
        fill="#8b5cf6" opacity="0.06">心</text>

  <!-- ambient particles -->
  <g fill="#c4b5fd" opacity="0.5">
    <circle cx="180" cy="90" r="2"/>
    <circle cx="260" cy="150" r="1.5"/>
    <circle cx="940" cy="110" r="2"/>
    <circle cx="1010" cy="180" r="1.5"/>
    <circle cx="600" cy="60" r="1.5"/>
    <circle cx="500" cy="330" r="1.5"/>
    <circle cx="720" cy="320" r="2"/>
  </g>

  <!-- chakra transfer beam -->
  <rect x="330" y="192" width="540" height="16" rx="8" fill="url(#beam)" filter="url(#blur1)"/>
  <rect x="330" y="196" width="540" height="8" rx="4" fill="url(#beam)"/>

  <!-- traveling chakra particles along the beam -->
  <g filter="url(#blur2)">
    <circle cx="430" cy="200" r="7" fill="#c4b5fd"/>
    <circle cx="600" cy="200" r="10" fill="#a78bfa"/>
    <circle cx="770" cy="200" r="7" fill="#c4b5fd"/>
  </g>

  <!-- sender silhouette (left) -->
  <g transform="translate(220,200)">
    <circle r="70" fill="url(#glow)" opacity="0.5" filter="url(#blur1)"/>
    <path d="M0,-90 C38,-90 62,-58 62,-18 C62,10 48,32 30,44 L46,110 L-46,110 L-30,44 C-48,32 -62,10 -62,-18 C-62,-58 -38,-90 0,-90 Z"
          fill="url(#silhouette)" stroke="#8b5cf6" stroke-opacity="0.4" stroke-width="2"/>
    <!-- hand-seal mark -->
    <circle cx="0" cy="-18" r="10" fill="none" stroke="#c4b5fd" stroke-width="2" opacity="0.8"/>
  </g>

  <!-- receiver silhouette (right) -->
  <g transform="translate(980,200)">
    <circle r="70" fill="url(#glow)" opacity="0.35" filter="url(#blur1)"/>
    <path d="M0,-90 C38,-90 62,-58 62,-18 C62,10 48,32 30,44 L46,110 L-46,110 L-30,44 C-48,32 -62,10 -62,-18 C-62,-58 -38,-90 0,-90 Z"
          fill="url(#silhouette)" stroke="#8b5cf6" stroke-opacity="0.25" stroke-width="2"/>
  </g>

  <text x="600" y="380" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,sans-serif"
        font-size="15" letter-spacing="3" fill="#9a97b8">SHINTENSHIN&#160;&#160;&#8226;&#160;&#160;MIND TRANSFER JUTSU</text>
</svg>
